document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

<\u002Fdiv>\n      <div style=\"position:relative;animation:rl-float 7s ease-in-out infinite;\">\n        <div style=\"position:relative;border-radius:22px;overflow:hidden;border:1px solid rgba(255,255,255,.12);box-shadow:0 30px 70px rgba(0,0,0,.45);aspect-ratio:4/5;background:repeating-linear-gradient(135deg,#15241c,#15241c 11px,#192c22 11px,#192c22 22px);\">\n          <x-import component-from-global-scope=\"image-slot\" from=\"fa043ebf-898b-4fca-a7a0-8f05e73c2679#/image-slot.js\" id=\"hero-acai\" shape=\"rect\" placeholder=\"Foto: açaizal / colheita de açaí no Bico do Papagaio\" style=\"width:100%;height:100%;\" hint-size=\"100%,100%\"><\u002Fx-import>\n        <\u002Fdiv>\n        <div style=\"position:absolute;left:-18px;bottom:24px;background:#fff;color:#0b1410;border-radius:14px;padding:12px 16px;box-shadow:0 12px 30px rgba(0,0,0,.3);display:flex;align-items:center;gap:11px;\">\n          <span style=\"width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(95,189,0,.2);\"><\u002Fspan>\n          <div><div style=\"font-family:'IBM Plex Mono';font-size:10.5px;color:var(--gray);letter-spacing:.08em;\">LOTE ACAI-TO-2026-001<\u002Fdiv><div style=\"font-weight:700;font-size:13px;\">Debulha · 0h02 · Qualidade Premium<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- stat strip -->\n    <div style=\"max-width:1200px;margin:clamp(44px,6vw,72px) auto 0;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);border-radius:16px;overflow:hidden;\">\n      <div style=\"background:var(--ink);padding:22px 20px;\"><div style=\"font-family:'Archivo';font-weight:800;font-size:clamp(26px,3vw,38px);color:var(--green);\">+739%<\u002Fdiv><div style=\"font-size:12.5px;color:#A9BEB0;\">crescimento da safra de açaí no TO (IBGE)<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:var(--ink);padding:22px 20px;\"><div style=\"font-family:'Archivo';font-weight:800;font-size:clamp(26px,3vw,38px);color:var(--yellow);\">6h<\u002Fdiv><div style=\"font-size:12.5px;color:#A9BEB0;\">janela crítica antes da fermentação<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:var(--ink);padding:22px 20px;\"><div style=\"font-family:'Archivo';font-weight:800;font-size:clamp(26px,3vw,38px);color:var(--blue);\">426<\u002Fdiv><div style=\"font-size:12.5px;color:#A9BEB0;\">indústrias de alimentos no Tocantins<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:var(--ink);padding:22px 20px;\"><div style=\"font-family:'Archivo';font-weight:800;font-size:clamp(26px,3vw,38px);color:#fff;\">13%<\u002Fdiv><div style=\"font-size:12.5px;color:#A9BEB0;\">cumprem as ações obrigatórias de rastreio<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- PROBLEMA -->\n  <section id=\"problema\" data-screen-label=\"Problema\" style=\"padding:clamp(72px,9vw,118px) clamp(18px,5vw,56px);background:var(--cream);\">\n    <div style=\"max-width:1200px;margin:0 auto;\">\n      <div style=\"display:inline-flex;align-items:center;gap:10px;font-family:'IBM Plex Mono';font-size:11.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--wine);margin-bottom:18px;\"><span style=\"width:24px;height:1px;background:var(--wine);\"><\u002Fspan>O Problema · Aderência ao desafio · 25 pts<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(30px,4.2vw,52px);line-height:1.05;letter-spacing:-.02em;max-width:880px;margin:0 0 20px;\">A cadeia do açaí registra origem, lote e destino de forma <span style=\"color:var(--wine);\">fragmentada<\u002Fspan> — em papel, planilhas e WhatsApp.<\u002Fh2>\n      <p style=\"font-size:18px;color:#43514a;max-width:720px;margin:0 0 50px;\">Sem rastro digital confiável, o produtor perde valor, a indústria perde previsibilidade e o consumidor não sabe a origem. No açaí, esse problema é agravado por uma biologia implacável: o fruto oxida em horas.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px;\">\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 22px;\">\n          <div style=\"font-family:'Archivo';font-weight:800;font-size:42px;color:var(--wine);line-height:1;\">41,9%<\u002Fdiv>\n          <p style=\"font-size:14px;color:#52605a;margin:12px 0 0;\">sabem o que é rastreabilidade — e só <strong>13%<\u002Fstrong> realizam as ações obrigatórias.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 22px;\">\n          <div style=\"font-family:'Archivo';font-weight:800;font-size:42px;color:var(--wine);line-height:1;\">30%<\u002Fdiv>\n          <p style=\"font-size:14px;color:#52605a;margin:12px 0 0;\">da produção pode ser perdida por falhas de logística e armazenamento.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 22px;\">\n          <div style=\"font-family:'Archivo';font-weight:800;font-size:42px;color:var(--wine);line-height:1;\">70%<\u002Fdiv>\n          <p style=\"font-size:14px;color:#52605a;margin:12px 0 0;\">dos antioxidantes (antocianinas) se perdem em 36h de cadeia informal.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--ink);border:1px solid var(--line);border-radius:18px;padding:26px 22px;color:#F4F7F1;\">\n          <div style=\"font-family:'Archivo';font-weight:800;font-size:42px;color:var(--yellow);line-height:1;\">1h<\u002Fdiv>\n          <p style=\"font-size:14px;color:#B9CCBF;margin:12px 0 0;\">após a debulha, o escurecimento enzimático já compromete o lote.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SEMÁFORO / CORRIDA CONTRA O RELÓGIO -->\n  <section data-screen-label=\"Semaforo\" style=\"padding:clamp(72px,9vw,118px) clamp(18px,5vw,56px);background:linear-gradient(180deg,#0b1410,#160d1a);color:#F4F7F1;\">\n    <div style=\"max-width:1200px;margin:0 auto;\">\n      <div style=\"display:inline-flex;align-items:center;gap:10px;font-family:'IBM Plex Mono';font-size:11.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--yellow);margin-bottom:18px;\"><span style=\"width:24px;height:1px;background:var(--yellow);\"><\u002Fspan>A Corrida contra a Oxidação<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(30px,4.2vw,52px);line-height:1.05;letter-spacing:-.02em;max-width:820px;margin:0 0 14px;\">Depois da debulha, cada hora derruba a qualidade.<\u002Fh2>\n      <p style=\"font-size:18px;color:#B9CCBF;max-width:680px;margin:0 0 44px;\">O semáforo logístico do RuraLog é calibrado para a janela biológica do açaí — <strong style=\"color:#fff;\">limiteHoras = 6<\u002Fstrong>, não dias.<\u002Fp>\n      <div style=\"height:10px;border-radius:999px;background:linear-gradient(90deg,var(--green) 0%,var(--green) 33%,var(--yellow) 50%,var(--yellow) 60%,var(--wine) 80%,var(--wine) 100%);margin-bottom:30px;\"><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;\">\n        <div style=\"background:rgba(255,255,255,.04);border:1px solid rgba(95,189,0,.4);border-radius:18px;padding:26px 24px;\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px;\"><span style=\"width:14px;height:14px;border-radius:50%;background:var(--green);box-shadow:0 0 14px var(--green);\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono';font-size:13px;color:var(--green);font-weight:600;\">0 – 3h<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:22px;margin-bottom:8px;\">Qualidade Premium<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#B9CCBF;margin:0;\">Máxima retenção de antocianinas. Lote elegível à classificação Tipo A (Especial).<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.04);border:1px solid rgba(255,203,0,.4);border-radius:18px;padding:26px 24px;\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px;\"><span style=\"width:14px;height:14px;border-radius:50%;background:var(--yellow);box-shadow:0 0 14px var(--yellow);\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono';font-size:13px;color:var(--yellow);font-weight:600;\">3 – 5h<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:22px;margin-bottom:8px;\">Início de Oxidação<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#B9CCBF;margin:0;\">O sistema dispara alerta para priorizar o lote na fila de despolpamento.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:rgba(154,28,90,.12);border:1px solid rgba(154,28,90,.55);border-radius:18px;padding:26px 24px;\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px;\"><span style=\"width:14px;height:14px;border-radius:50%;background:var(--wine);box-shadow:0 0 14px var(--wine);animation:rl-pulse 1.6s infinite;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono';font-size:13px;color:#ff6db0;font-weight:600;\">+6h<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:22px;margin-bottom:8px;\">Risco de Fermentação<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#E2B9CE;margin:0;\">Lote rebaixado na classificação e inspeção obrigatória pelo Controle de Qualidade.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- DEMANDA REGULATÓRIA -->\n  <section data-screen-label=\"Regulacao\" style=\"padding:clamp(72px,9vw,118px) clamp(18px,5vw,56px);background:var(--cream);\">\n    <div style=\"max-width:1200px;margin:0 auto;display:grid;grid-template-columns:.85fr 1.15fr;gap:clamp(34px,5vw,72px);align-items:start;\">\n      <div style=\"position:sticky;top:90px;\">\n        <div style=\"display:inline-flex;align-items:center;gap:10px;font-family:'IBM Plex Mono';font-size:11.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-bottom:18px;\"><span style=\"width:24px;height:1px;background:var(--blue);\"><\u002Fspan>Demanda Regulatória<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(28px,3.6vw,46px);line-height:1.06;letter-spacing:-.02em;margin:0 0 18px;\">Rastreabilidade não é tendência. É exigência da ANVISA e do MAPA.<\u002Fh2>\n        <p style=\"font-size:16px;color:#43514a;margin:0;\">Existe demanda regulatória <strong>real e não atendida<\u002Fstrong> por soluções que organizem origem, lote, movimentação e recall. É exatamente o que o RuraLog gera.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 26px;display:flex;gap:20px;\">\n          <div style=\"font-family:'IBM Plex Mono';font-weight:600;color:var(--blue);font-size:14px;min-width:30px;\">01<\u002Fdiv>\n          <div><div style=\"font-weight:700;font-size:17px;margin-bottom:5px;\">Vegetais frescos — INC 02/2018 &amp; 01/2019<\u002Fdiv><p style=\"font-size:14.5px;color:#52605a;margin:0;\">Exigem registro de produto, origem, destino, lote e documentos, da produção à comercialização.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 26px;display:flex;gap:20px;\">\n          <div style=\"font-family:'IBM Plex Mono';font-weight:600;color:var(--blue);font-size:14px;min-width:30px;\">02<\u002Fdiv>\n          <div><div style=\"font-weight:700;font-size:17px;margin-bottom:5px;\">Alimentos embalados — RDC 727/2022<\u002Fdiv><p style=\"font-size:14.5px;color:#52605a;margin:0;\">Exige identificação de origem e lote na rotulagem do produto industrializado.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 26px;display:flex;gap:20px;\">\n          <div style=\"font-family:'IBM Plex Mono';font-weight:600;color:var(--blue);font-size:14px;min-width:30px;\">03<\u002Fdiv>\n          <div><div style=\"font-weight:700;font-size:17px;margin-bottom:5px;\">Recall sanitário<\u002Fdiv><p style=\"font-size:14.5px;color:#52605a;margin:0;\">Para recolher produtos com risco, a indústria precisa localizar lotes, distribuição e destino — em minutos.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--ink);border-radius:16px;padding:24px 26px;display:flex;gap:20px;color:#F4F7F1;\">\n          <div style=\"font-family:'IBM Plex Mono';font-weight:600;color:var(--green);font-size:14px;min-width:30px;\">04<\u002Fdiv>\n          <div><div style=\"font-weight:700;font-size:17px;margin-bottom:5px;\">18 meses de retenção inviolável<\u002Fdiv><p style=\"font-size:14.5px;color:#B9CCBF;margin:0;\">A INC 02/2018 obriga o arquivamento das informações por 18 meses após a expedição. Descumprir = multa e interdição.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- A SOLUÇÃO + TIMELINE INTERATIVA -->\n  <section id=\"cadeia\" data-screen-label=\"Solucao\" style=\"padding:clamp(72px,9vw,118px) clamp(18px,5vw,56px);background:linear-gradient(180deg,#0b1410,#0e1a14);color:#F4F7F1;\">\n    <div style=\"max-width:1200px;margin:0 auto;\">\n      <div style=\"display:inline-flex;align-items:center;gap:10px;font-family:'IBM Plex Mono';font-size:11.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:18px;\"><span style=\"width:24px;height:1px;background:var(--green);\"><\u002Fspan>A Solução · Qualidade do protótipo · 15 pts<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(30px,4.2vw,52px);line-height:1.05;letter-spacing:-.02em;max-width:820px;margin:0 0 14px;\">Uma plataforma que conecta a cadeia em 5 elos.<\u002Fh2>\n      <p style=\"font-size:18px;color:#B9CCBF;max-width:680px;margin:0 0 42px;\">Rastreamento digital ponta a ponta, do manejo do açaizal ao QR Code na embalagem. <strong style=\"color:#fff;\">Clique em cada elo<\u002Fstrong> para ver os pontos de captura de dados.<\u002Fp>\n\n      <!-- tabs -->\n      <div role=\"tablist\" style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:26px;\">\n        <sc-for list=\"{{ elos }}\" as=\"elo\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ elo.select }}\" style=\"{{ elo.tabStyle }}\">\n            <span style=\"font-family:'IBM Plex Mono';font-size:11px;opacity:.7;\">{{ elo.num }}<\u002Fspan>\n            <span style=\"font-family:'Archivo';font-weight:700;font-size:15px;display:block;margin-top:3px;\">{{ elo.name }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- panel -->\n      <div style=\"background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:22px;overflow:hidden;display:grid;grid-template-columns:.9fr 1.1fr;\">\n        <div style=\"{{ active.heroStyle }}\">\n          <div style=\"font-family:'IBM Plex Mono';font-size:12px;letter-spacing:.1em;opacity:.85;\">ETAPA {{ active.num }}<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:900;font-size:clamp(28px,3.4vw,44px);line-height:1.02;margin:10px 0 14px;\">{{ active.name }}<\u002Fdiv>\n          <div style=\"font-size:15px;line-height:1.5;max-width:340px;opacity:.95;\">{{ active.tagline }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:clamp(26px,3vw,40px);\">\n          <div style=\"font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--green);margin-bottom:14px;\">Ação do software<\u002Fdiv>\n          <p style=\"font-size:16px;color:#E4ECE6;margin:0 0 26px;\">{{ active.action }}<\u002Fp>\n          <div style=\"font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-d);margin-bottom:14px;\">Pontos de captura<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:13px;\">\n            <sc-for list=\"{{ active.points }}\" as=\"pt\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;gap:13px;align-items:flex-start;\">\n                <span style=\"width:7px;height:7px;border-radius:50%;background:var(--green);margin-top:8px;flex-shrink:0;\"><\u002Fspan>\n                <span style=\"font-size:14.5px;color:#CBD8CE;\">{{ pt }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- INOVAÇÃO -->\n  <section data-screen-label=\"Inovacao\" style=\"padding:clamp(72px,9vw,118px) clamp(18px,5vw,56px);background:var(--cream);\">\n    <div style=\"max-width:1200px;margin:0 auto;\">\n      <div style=\"display:inline-flex;align-items:center;gap:10px;font-family:'IBM Plex Mono';font-size:11.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--green-deep);margin-bottom:18px;\"><span style=\"width:24px;height:1px;background:var(--green-deep);\"><\u002Fspan>Inovação · 15 pts<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(30px,4.2vw,52px);line-height:1.05;letter-spacing:-.02em;max-width:820px;margin:0 0 14px;\">Realidade regional encontra pressão regulatória.<\u002Fh2>\n      <p style=\"font-size:18px;color:#43514a;max-width:700px;margin:0 0 48px;\">O campo precisa funcionar com pouca internet; a indústria precisa de registros confiáveis sem sistemas caros. Quatro diferenciais resolvem os dois.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:18px;\">\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px;\">\n          <div style=\"font-family:'IBM Plex Mono';font-size:12px;color:var(--green-deep);margin-bottom:10px;\">// offline-first<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:21px;margin-bottom:8px;\">Modo offline no campo<\u002Fdiv>\n          <p style=\"font-size:15px;color:#52605a;margin:0;\">App PWA com timestamp criptografado: o extrativista registra a debulha sem sinal, e o dado sincroniza ao alcançar cobertura. Pensado para o transporte fluvial do Bico do Papagaio.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px;\">\n          <div style=\"font-family:'IBM Plex Mono';font-size:12px;color:var(--green-deep);margin-bottom:10px;\">// compliance<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:21px;margin-bottom:8px;\">Checklist regulatório<\u002Fdiv>\n          <p style=\"font-size:15px;color:#52605a;margin:0;\">Produto, lote, origem, destino, documentos e histórico de movimentação — estruturados conforme a INC 02/2018, prontos para auditoria.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px;\">\n          <div style=\"font-family:'IBM Plex Mono';font-size:12px;color:var(--green-deep);margin-bottom:10px;\">// transparência<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:21px;margin-bottom:8px;\">QR Code + Painel de Privacidade<\u002Fdiv>\n          <p style=\"font-size:15px;color:#52605a;margin:0;\">A agroindústria define o que cada QR mostra: perfil B2B (laudos, classificação MAPA, temperatura) e B2C (origem, município, selo de frescor).<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px;\">\n          <div style=\"font-family:'IBM Plex Mono';font-size:12px;color:var(--green-deep);margin-bottom:10px;\">// IA preditiva<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:21px;margin-bottom:8px;\">Alerta de quebra de safra<\u002Fdiv>\n          <p style=\"font-size:15px;color:#52605a;margin:0;\">Ao registrar Podridão-do-cacho ou Broca-do-estipe, a IA estima a redução de polpa e avisa a fábrica com até 8 semanas de antecedência.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROTÓTIPO -->\n  <section id=\"prototipo\" data-screen-label=\"Prototipo\" style=\"padding:clamp(72px,9vw,118px) clamp(18px,5vw,56px);background:#EDF0E8;\">\n    <div style=\"max-width:1200px;margin:0 auto;\">\n      <div style=\"display:inline-flex;align-items:center;gap:10px;font-family:'IBM Plex Mono';font-size:11.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--green-deep);margin-bottom:18px;\"><span style=\"width:24px;height:1px;background:var(--green-deep);\"><\u002Fspan>Protótipo · do campo à mesa<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(30px,4.2vw,52px);line-height:1.05;letter-spacing:-.02em;max-width:760px;margin:0 0 44px;\">Três telas, uma cadeia rastreada de ponta a ponta.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;\">\n        <div>\n          <div style=\"border-radius:18px;overflow:hidden;border:1px solid var(--line);aspect-ratio:9/16;background:repeating-linear-gradient(135deg,#dfe4d8,#dfe4d8 11px,#e9ece3 11px,#e9ece3 22px);box-shadow:0 16px 40px rgba(0,0,0,.1);\">\n            <x-import component-from-global-scope=\"image-slot\" from=\"fa043ebf-898b-4fca-a7a0-8f05e73c2679#/image-slot.js\" id=\"proto-campo\" shape=\"rect\" placeholder=\"Tela do app no campo (modo offline)\" style=\"width:100%;height:100%;\" hint-size=\"100%,100%\"><\u002Fx-import>\n          <\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:18px;margin:18px 0 5px;\">Visão do Campo<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#52605a;margin:0;\">Cadastro offline de produção, lote em \"rasas\", insumos e comprador. O relógio de perecibilidade começa na debulha.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"border-radius:18px;overflow:hidden;border:1px solid var(--line);aspect-ratio:9/16;background:repeating-linear-gradient(135deg,#dfe4d8,#dfe4d8 11px,#e9ece3 11px,#e9ece3 22px);box-shadow:0 16px 40px rgba(0,0,0,.1);\">\n            <x-import component-from-global-scope=\"image-slot\" from=\"fa043ebf-898b-4fca-a7a0-8f05e73c2679#/image-slot.js\" id=\"proto-industria\" shape=\"rect\" placeholder=\"Painel da agroindústria\" style=\"width:100%;height:100%;\" hint-size=\"100%,100%\"><\u002Fx-import>\n          <\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:18px;margin:18px 0 5px;\">Painel da Indústria<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#52605a;margin:0;\">Recepção, branqueamento ≥80°C, CQ por sólidos totais e expedição — histórico pronto para auditoria.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"border-radius:18px;overflow:hidden;border:1px solid var(--line);aspect-ratio:9/16;background:repeating-linear-gradient(135deg,#dfe4d8,#dfe4d8 11px,#e9ece3 11px,#e9ece3 22px);box-shadow:0 16px 40px rgba(0,0,0,.1);\">\n            <x-import component-from-global-scope=\"image-slot\" from=\"fa043ebf-898b-4fca-a7a0-8f05e73c2679#/image-slot.js\" id=\"proto-consumidor\" shape=\"rect\" placeholder=\"Passaporte do açaí (QR Code)\" style=\"width:100%;height:100%;\" hint-size=\"100%,100%\"><\u002Fx-import>\n          <\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:18px;margin:18px 0 5px;\">Passaporte do Consumidor<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#52605a;margin:0;\">Ana escaneia o QR e descobre o município de origem, o tipo de açaizal e o selo \"processado em menos de 5h\".<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PERSONAS -->\n  <section data-screen-label=\"Personas\" style=\"padding:clamp(72px,9vw,118px) clamp(18px,5vw,56px);background:var(--cream);\">\n    <div style=\"max-width:1200px;margin:0 auto;\">\n      <div style=\"display:inline-flex;align-items:center;gap:10px;font-family:'IBM Plex Mono';font-size:11.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--green-deep);margin-bottom:18px;\"><span style=\"width:24px;height:1px;background:var(--green-deep);\"><\u002Fspan>Para quem construímos<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(30px,4.2vw,52px);line-height:1.05;letter-spacing:-.02em;max-width:740px;margin:0 0 44px;\">Quatro pessoas, uma cadeia conectada.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px;\">\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 22px;\">\n          <div style=\"width:54px;height:54px;border-radius:50%;background:repeating-linear-gradient(135deg,#cfe0bf,#cfe0bf 6px,#dcebcf 6px,#dcebd0 12px);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:800;color:var(--green-deep);font-size:18px;margin-bottom:16px;\">SJ<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:18px;\">Seu João<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono';font-size:11px;color:var(--gray);margin-bottom:12px;\">EXTRATIVISTA · ARAGUATINS<\u002Fdiv>\n          <p style=\"font-size:13.5px;color:#52605a;margin:0 0 10px;\"><strong style=\"color:var(--wine);\">Dor:<\u002Fstrong> escoar a colheita em poucas horas por vias fluviais, sem internet.<\u002Fp>\n          <p style=\"font-size:13.5px;color:#52605a;margin:0;\"><strong style=\"color:var(--green-deep);\">Com RuraLog:<\u002Fstrong> registra a debulha offline e certifica a origem do seu açaí.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 22px;\">\n          <div style=\"width:54px;height:54px;border-radius:50%;background:repeating-linear-gradient(135deg,#bfd8e9,#bfd8e9 6px,#d0e4f2 6px,#d0e4f2 12px);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:800;color:var(--blue);font-size:18px;margin-bottom:16px;\">M<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:18px;\">Marina<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono';font-size:11px;color:var(--gray);margin-bottom:12px;\">GESTORA · AGROINDÚSTRIA<\u002Fdiv>\n          <p style=\"font-size:13.5px;color:#52605a;margin:0 0 10px;\"><strong style=\"color:var(--wine);\">Dor:<\u002Fstrong> equilibrar a chegada caótica de lotes frescos com a capacidade da fábrica.<\u002Fp>\n          <p style=\"font-size:13.5px;color:#52605a;margin:0;\"><strong style=\"color:var(--green-deep);\">Com RuraLog:<\u002Fstrong> prioriza lotes pelo semáforo e gera registros prontos para o MAPA.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 22px;\">\n          <div style=\"width:54px;height:54px;border-radius:50%;background:repeating-linear-gradient(135deg,#cfe0bf,#cfe0bf 6px,#dcebd0 6px,#dcebd0 12px);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:800;color:var(--green-deep);font-size:18px;margin-bottom:16px;\">C<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:18px;\">Carlos<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono';font-size:11px;color:var(--gray);margin-bottom:12px;\">LOGÍSTICA · VAREJO<\u002Fdiv>\n          <p style=\"font-size:13.5px;color:#52605a;margin:0 0 10px;\"><strong style=\"color:var(--wine);\">Dor:<\u002Fstrong> garantir que a cadeia de frio (−18°C) não foi rompida na distribuição.<\u002Fp>\n          <p style=\"font-size:13.5px;color:#52605a;margin:0;\"><strong style=\"color:var(--green-deep);\">Com RuraLog:<\u002Fstrong> dashboard de validade com alertas FIFO para girar o estoque congelado.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 22px;\">\n          <div style=\"width:54px;height:54px;border-radius:50%;background:repeating-linear-gradient(135deg,#e3cfe9,#e3cfe9 6px,#efdcf2 6px,#efdcf2 12px);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:800;color:var(--plum);font-size:18px;margin-bottom:16px;\">A<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:18px;\">Ana<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono';font-size:11px;color:var(--gray);margin-bottom:12px;\">CONSUMIDORA · CENTRO URBANO<\u002Fdiv>\n          <p style=\"font-size:13.5px;color:#52605a;margin:0 0 10px;\"><strong style=\"color:var(--wine);\">Dor:<\u002Fstrong> não sabe se o açaí é diluído ou de origem ética.<\u002Fp>\n          <p style=\"font-size:13.5px;color:#52605a;margin:0;\"><strong style=\"color:var(--green-deep);\">Com RuraLog:<\u002Fstrong> escaneia o QR e vê a saga do fruto, valorizando a bioeconomia do TO.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MODELO DE NEGÓCIO -->\n  <section id=\"modelo\" data-screen-label=\"Modelo\" style=\"padding:clamp(72px,9vw,118px) clamp(18px,5vw,56px);background:linear-gradient(180deg,#0b1410,#11201a);color:#F4F7F1;\">\n    <div style=\"max-width:1200px;margin:0 auto;\">\n      <div style=\"display:inline-flex;align-items:center;gap:10px;font-family:'IBM Plex Mono';font-size:11.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:18px;\"><span style=\"width:24px;height:1px;background:var(--green);\"><\u002Fspan>Modelo de Negócio e Impacto · 15 pts<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(30px,4.2vw,52px);line-height:1.05;letter-spacing:-.02em;max-width:780px;margin:0 0 14px;\">Freemium: o produtor entra de graça, a indústria paga pelo valor.<\u002Fh2>\n      <p style=\"font-size:18px;color:#B9CCBF;max-width:680px;margin:0 0 44px;\">A gratuidade no campo acelera a adesão e gera o dado de origem. A receita vem de quem mais ganha com rastreabilidade, organização e recall.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:1fr 1.2fr;gap:18px;\">\n        <div style=\"background:rgba(95,189,0,.1);border:1px solid rgba(95,189,0,.4);border-radius:20px;padding:34px;\">\n          <div style=\"font-family:'IBM Plex Mono';font-size:12px;color:var(--green);letter-spacing:.1em;\">AGRICULTOR / EXTRATIVISTA<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:900;font-size:54px;line-height:1;margin:14px 0 8px;\">R$ 0<\u002Fdiv>\n          <div style=\"font-size:15px;color:#CBD8CE;\">100% gratuito — inclusão digital e certificação de origem. Quanto mais produtores, mais valiosa a rede.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:rgba(0,133,255,.08);border:1px solid rgba(0,133,255,.4);border-radius:20px;padding:34px;\">\n          <div style=\"font-family:'IBM Plex Mono';font-size:12px;color:#5fb0ff;letter-spacing:.1em;\">INDÚSTRIA / AGROINDÚSTRIA<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:900;font-size:30px;line-height:1.1;margin:14px 0 18px;\">Assinatura + uso<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:12px;\">\n            <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"color:var(--green);font-weight:700;\">→<\u002Fspan><span style=\"font-size:15px;color:#D6E2D9;\">Licença / mensalidade por painel de gestão<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"color:var(--green);font-weight:700;\">→<\u002Fspan><span style=\"font-size:15px;color:#D6E2D9;\">Por volume de lotes rastreados<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"color:var(--green);font-weight:700;\">→<\u002Fspan><span style=\"font-size:15px;color:#D6E2D9;\">Por QR Codes emitidos na expedição<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"color:var(--green);font-weight:700;\">→<\u002Fspan><span style=\"font-size:15px;color:#D6E2D9;\">Receita ancorada em eficiência, recall e conformidade<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- VIABILIDADE -->\n  <section id=\"viabilidade\" data-screen-label=\"Viabilidade\" style=\"padding:clamp(72px,9vw,118px) clamp(18px,5vw,56px);background:var(--cream);\">\n    <div style=\"max-width:1200px;margin:0 auto;\">\n      <div style=\"display:inline-flex;align-items:center;gap:10px;font-family:'IBM Plex Mono';font-size:11.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);margin-bottom:18px;\"><span style=\"width:24px;height:1px;background:var(--blue);\"><\u002Fspan>Viabilidade e Aplicabilidade · 20 pts<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(30px,4.2vw,52px);line-height:1.05;letter-spacing:-.02em;max-width:740px;margin:0 0 16px;\">Por que funciona aqui — no Tocantins real.<\u002Fh2>\n      <p style=\"font-size:18px;color:#43514a;max-width:720px;margin:0 0 44px;\">Desenhado para a baixa conectividade do interior e para os dois polos produtivos do estado. Começa simples, com QR Code e registros — IoT e blockchain ficam no roadmap.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;\">\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px;\">\n          <div style=\"font-family:'IBM Plex Mono';font-size:11px;color:var(--gray);letter-spacing:.1em;margin-bottom:8px;\">POLO 1 · BICO DO PAPAGAIO<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:22px;margin-bottom:8px;\">Araguatins<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#52605a;margin:0;\">Agroextrativismo familiar de açaizais nativos, cooperativas e logística fluvial. O cenário-semente do RuraLog — máxima dor, máximo impacto social.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px;\">\n          <div style=\"font-family:'IBM Plex Mono';font-size:11px;color:var(--gray);letter-spacing:.1em;margin-bottom:8px;\">POLO 2 · VALE DO ARAGUAIA<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:22px;margin-bottom:8px;\">Lagoa da Confusão<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#52605a;margin:0;\">Agronegócio tecnificado e irrigado, processamento em menos de 4h. A mesma arquitetura escala para fazendas verticalizadas de larga escala.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--ink);border-radius:18px;padding:30px clamp(24px,3vw,40px);color:#F4F7F1;display:grid;grid-template-columns:1.4fr 1fr;gap:30px;align-items:center;\">\n        <div>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:20px;margin-bottom:10px;\">Começa simples, escala com a cadeia.<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#B9CCBF;margin:0;\">Hoje: QR Code + registros digitais para as 426 indústrias do estado, em especial micro e pequenas. Amanhã: sensores IoT de cadeia de frio, blockchain e expansão para outras matérias-primas regionais — cupuaçu, pequi, baru.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;font-family:'IBM Plex Mono';font-size:12px;\">\n          <div style=\"flex:1;background:rgba(95,189,0,.16);border:1px solid rgba(95,189,0,.4);border-radius:12px;padding:14px;text-align:center;\"><div style=\"color:var(--green);font-weight:600;\">HOJE<\u002Fdiv><div style=\"color:#CBD8CE;margin-top:6px;\">QR + registros<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:14px;text-align:center;\"><div style=\"color:var(--muted-d);font-weight:600;\">ESCALA<\u002Fdiv><div style=\"color:#9DB4A6;margin-top:6px;\">IoT · blockchain<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- IMPACTO -->\n  <section data-screen-label=\"Impacto\" style=\"padding:clamp(64px,8vw,100px) clamp(18px,5vw,56px);background:#EDF0E8;\">\n    <div style=\"max-width:1200px;margin:0 auto;\">\n      <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(26px,3.4vw,40px);letter-spacing:-.02em;margin:0 0 36px;\">Impacto em quatro frentes<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;\">\n        <div style=\"border-top:3px solid var(--green);padding-top:18px;\"><div style=\"font-family:'Archivo';font-weight:700;font-size:18px;margin-bottom:8px;\">Econômico<\u002Fdiv><p style=\"font-size:14px;color:#52605a;margin:0;\">Menos perdas, registros organizados e mais valor no açaí tocantinense.<\u002Fp><\u002Fdiv>\n        <div style=\"border-top:3px solid var(--blue);padding-top:18px;\"><div style=\"font-family:'Archivo';font-weight:700;font-size:18px;margin-bottom:8px;\">Social<\u002Fdiv><p style=\"font-size:14px;color:#52605a;margin:0;\">Inclusão digital do produtor familiar e fortalecimento de cooperativas.<\u002Fp><\u002Fdiv>\n        <div style=\"border-top:3px solid var(--yellow);padding-top:18px;\"><div style=\"font-family:'Archivo';font-weight:700;font-size:18px;margin-bottom:8px;\">Ambiental<\u002Fdiv><p style=\"font-size:14px;color:#52605a;margin:0;\">Menos desperdício de alimentos e valorização da bioeconomia da floresta.<\u002Fp><\u002Fdiv>\n        <div style=\"border-top:3px solid var(--plum);padding-top:18px;\"><div style=\"font-family:'Archivo';font-weight:700;font-size:18px;margin-bottom:8px;\">Regulatório<\u002Fdiv><p style=\"font-size:14px;color:#52605a;margin:0;\">Origem, lote e movimentação comprováveis — pronto para recall e fiscalização.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CRITÉRIOS FIETO -->\n  <sc-if value=\"{{ showCriteria }}\" hint-placeholder-val=\"{{ true }}\">\n  <section data-screen-label=\"Criterios\" style=\"padding:clamp(72px,9vw,110px) clamp(18px,5vw,56px);background:var(--cream);\">\n    <div style=\"max-width:1000px;margin:0 auto;\">\n      <div style=\"display:inline-flex;align-items:center;gap:10px;font-family:'IBM Plex Mono';font-size:11.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--green-deep);margin-bottom:18px;\"><span style=\"width:24px;height:1px;background:var(--green-deep);\"><\u002Fspan>Como respondemos ao Desafio FIETO<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo';font-weight:800;font-size:clamp(28px,3.6vw,44px);letter-spacing:-.02em;margin:0 0 34px;max-width:680px;\">Cada critério, endereçado por design.<\u002Fh2>\n      <div style=\"background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;\">\n        <sc-for list=\"{{ criteria }}\" as=\"c\" hint-placeholder-count=\"6\">\n          <div style=\"{{ c.rowStyle }}\">\n            <div style=\"flex:1;min-width:0;\"><div style=\"font-weight:700;font-size:15.5px;\">{{ c.name }}<\u002Fdiv><div style=\"font-size:13px;color:#6a766f;\">{{ c.where }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"font-family:'Archivo';font-weight:800;font-size:20px;color:var(--green-deep);white-space:nowrap;\">{{ c.pts }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:18px 26px;background:var(--ink);color:#fff;\">\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:16px;\">Pontuação total endereçada<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:900;font-size:24px;color:var(--green);\">100 pts<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- CTA FINAL -->\n  <footer data-screen-label=\"Fechamento\" style=\"position:relative;padding:clamp(72px,9vw,120px) clamp(18px,5vw,56px) clamp(48px,6vw,72px);background:radial-gradient(800px 460px at 80% 0%,rgba(122,46,140,.28),transparent 60%),radial-gradient(700px 440px at 10% 90%,rgba(95,189,0,.16),transparent 60%),var(--ink);color:#F4F7F1;overflow:hidden;\">\n    <div style=\"max-width:1000px;margin:0 auto;text-align:center;\">\n      <img src=\"29e7cf85-6641-4c4d-9214-b2cceb6248a2\" alt=\"RuraLog\" style=\"height:50px;width:auto;margin:0 auto 28px;display:block;\">\n      <h2 style=\"font-family:'Archivo';font-weight:900;font-size:clamp(30px,4.4vw,56px);line-height:1.04;letter-spacing:-.02em;margin:0 0 18px;\">Do campo à mesa,<br>com inteligência.<\u002Fh2>\n      <p style=\"font-size:18px;color:#C4D4C9;max-width:560px;margin:0 auto 34px;\">O tempo é o inimigo do açaí. O RuraLog congela o relógio — e dá ao Tocantins uma cadeia rastreável, conforme e justa.<\u002Fp>\n      <div style=\"display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:46px;\">\n        <a href=\"{{ protoUrl }}\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:10px;background:var(--green);color:#0b1410;font-weight:700;font-size:16px;padding:16px 32px;border-radius:999px;text-decoration:none;\" style-hover=\"background:#6fd400;transform:translateY(-2px);\">Acesse o protótipo →<\u002Fa>\n        <div style=\"display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:12px 18px;\">\n          <div style=\"width:62px;height:62px;border-radius:10px;background:repeating-linear-gradient(45deg,#1a2a22,#1a2a22 5px,#24382d 5px,#24382d 10px);display:flex;align-items:center;justify-content:center;\">\n            <x-import component-from-global-scope=\"image-slot\" from=\"fa043ebf-898b-4fca-a7a0-8f05e73c2679#/image-slot.js\" id=\"qr-proto\" shape=\"rounded\" radius=\"8\" placeholder=\"QR\" style=\"width:62px;height:62px;\" hint-size=\"62px,62px\"><\u002Fx-import>\n          <\u002Fdiv>\n          <div style=\"text-align:left;\"><div style=\"font-family:'IBM Plex Mono';font-size:10.5px;color:var(--muted-d);letter-spacing:.08em;\">ESCANEIE<\u002Fdiv><div style=\"font-size:13px;color:#E4ECE6;max-width:150px;\">o passaporte do açaí no protótipo<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid rgba(255,255,255,.1);padding-top:26px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;font-size:13px;color:#9DB4A6;\">\n        <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"font-family:'Archivo';font-weight:800;font-size:16px;\"><span style=\"color:var(--green)\">Rura<\u002Fspan><span style=\"color:var(--blue)\">Log<\u002Fspan><\u002Fspan><span>· Equipe {{ teamName }}<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono';font-size:11.5px;letter-spacing:.06em;\">DESAFIO INDUSTRIAL FIETO 2026 · TOCANTINS<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;protoUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;#prototipo&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Conteúdo&quot;},&quot;teamName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;RuraLog&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Conteúdo&quot;},&quot;showCriteria&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Seções&quot;}}\">\nclass Component extends DCLogic {\n  state = { elo: 0 };\n\n  renderVals() {\n    const ACCENT = '#5FBD00', BLUE = '#0085FF', YELLOW = '#FFCB00', GREEND = '#3F8B18', PLUM = '#7A2E8C';\n    const raw = [\n      {\n        name: 'Campo',\n        accent: ACCENT,\n        heroBg: 'linear-gradient(160deg,#1d7a1a,#0d3d12)',\n        tagline: 'Do manejo do açaizal à debulha. O app PWA offline-first inclui o extrativista e certifica a origem do Açaí do Tocantins.',\n        action: 'Aplicativo offline para o produtor: gerencia o ciclo do açaizal, registra a safra em \"rasas\" e dispara o relógio crítico de perecibilidade na debulha.',\n        points: [\n          'Onboarding: cadastro do produtor + geolocalização GPS do açaizal (nativo ou cultivado).',\n          'Manejo: roçagem do sub-bosque, desbaste de estipes e monitoramento de pragas.',\n          'Diário fitossanitário: a IA detecta a Podridão-do-cacho e alerta a indústria com semanas de antecedência.',\n          'Debulha: gera o lote e o QR Code — inicia o cronômetro de oxidação.'\n        ]\n      },\n      {\n        name: 'Logística',\n        accent: YELLOW,\n        heroBg: 'linear-gradient(160deg,#b88900,#5e3d00)',\n        tagline: 'A corrida contra a oxidação. Monitoramento de trânsito com semáforo adaptado à janela biológica do açaí, em logística fluvial e rodoviária.',\n        action: 'O sistema avalia o tempo de trânsito desde a debulha e classifica o lote por cor — verde, amarelo ou vermelho — guiando a prioridade na fábrica.',\n        points: [\n          'Expedição: leitura de QR/GPS embarca a carga e dispara o cronômetro.',\n          'Rastreio de rota: GPS em tempo real para cargas de alto valor; checkpoints manuais para as demais.',\n          'Semáforo: 0–3h premium · 3–5h priorizar · acima de 6h risco de fermentação.'\n        ]\n      },\n      {\n        name: 'Indústria',\n        accent: BLUE,\n        heroBg: 'linear-gradient(160deg,#0a63c2,#06294f)',\n        tagline: 'Despolpamento e conformidade. O painel da agroindústria usa IA para cruzar tempos, achar gargalos e priorizar lotes em risco. Segue o PIQ do MAPA.',\n        action: 'Acompanha cada passo do açaí no chão de fábrica, da recepção à polpa congelada, registrando logs obrigatórios de tempo e temperatura.',\n        points: [\n          'Recepção e pesagem: a \"catraca digital\" calcula o tempo total de trânsito desde a debulha.',\n          'Branqueamento: validação obrigatória de temperatura ≥ 80°C por 10s — inativa enzimas e patógenos.',\n          'CQ final: classificação por sólidos totais — Tipo A > 14%, B 11–14%, C 8–11%.',\n          'Congelamento (−18 a −25°C) e expedição da polpa rastreada.'\n        ]\n      },\n      {\n        name: 'Varejo',\n        accent: GREEND,\n        heroBg: 'linear-gradient(160deg,#2f6b1f,#163510)',\n        tagline: 'Gestão da cadeia de frio e da prateleira. Portal do cliente para supermercados e painel de privacidade para a agroindústria.',\n        action: 'Garante a integridade do congelado e dá à indústria o controle sobre o que cada QR Code revela ao mercado.',\n        points: [\n          'Recepção: dashboard de validade (polpa congelada dura 6–12 meses) com alertas FIFO para girar o estoque.',\n          'Painel de privacidade: a indústria define o perfil B2B (laudos, MAPA, temperatura) e o B2C (origem e município).'\n        ]\n      },\n      {\n        name: 'Consumidor',\n        accent: PLUM,\n        heroBg: 'linear-gradient(160deg,#7a2e8c,#3a1244)',\n        tagline: 'Transparência e valorização regional. Uma página pública via câmera do celular — o Passaporte de Qualidade do Açaí do Tocantins.',\n        action: 'Fecha a cadeia valorizando o selo regional e devolvendo inteligência de mercado para a agroindústria.',\n        points: [\n          'Escaneamento: lê o QR Code da embalagem e registra local e horário de forma anônima.',\n          'História e origem: município no TO, tipo de açaizal, classificação e selo \"processado em menos de 5h\".',\n          'Pesquisa de opinião: 1 a 3 perguntas que voltam ao painel da agroindústria.'\n        ]\n      }\n    ];\n\n    const idx = this.state.elo;\n    const elos = raw.map((e, i) => {\n      const active = i === idx;\n      return {\n        name: e.name,\n        num: String(i + 1).padStart(2, '0'),\n        select: () => this.setState({ elo: i }),\n        tabStyle: 'text-align:left;cursor:pointer;border-radius:14px;padding:14px 16px;border:1px solid ' +\n          (active ? e.accent : 'rgba(255,255,255,.14)') + ';background:' +\n          (active ? e.accent : 'rgba(255,255,255,.03)') + ';color:' +\n          (active ? '#0b1410' : '#C4D4C9') + ';transition:all .2s;'\n      };\n    });\n\n    const a = raw[idx];\n    const active = {\n      num: String(idx + 1).padStart(2, '0'),\n      name: a.name,\n      tagline: a.tagline,\n      action: a.action,\n      points: a.points,\n      heroStyle: 'padding:clamp(28px,3vw,44px);color:#fff;background:' + a.heroBg + ';display:flex;flex-direction:column;justify-content:center;'\n    };\n\n    const critRaw = [\n      { name: 'Aderência ao desafio e resolução do problema', where: 'Problema · Demanda Regulatória', pts: '25 pts' },\n      { name: 'Viabilidade e aplicabilidade', where: 'Viabilidade · dois polos do TO', pts: '20 pts' },\n      { name: 'Inovação', where: 'Offline · IA preditiva · QR privado', pts: '15 pts' },\n      { name: 'Qualidade do protótipo', where: 'A Solução · 3 telas', pts: '15 pts' },\n      { name: 'Modelo de negócio e impacto', where: 'Freemium · 4 frentes de impacto', pts: '15 pts' },\n      { name: 'Qualidade do pitch', where: 'Narrativa do campo à mesa', pts: '10 pts' }\n    ];\n    const criteria = critRaw.map((c, i) => ({\n      name: c.name, where: c.where, pts: c.pts,\n      rowStyle: 'display:flex;align-items:center;justify-content:space-between;gap:20px;padding:18px 26px;' +\n        (i < critRaw.length ? 'border-bottom:1px solid var(--line);' : '')\n    }));\n\n    return {\n      elos,\n      active,\n      criteria,\n      protoUrl: this.props.protoUrl ?? '#prototipo',\n      showCriteria: this.props.showCriteria ?? true,\n      teamName: this.props.teamName ?? 'RuraLog'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
