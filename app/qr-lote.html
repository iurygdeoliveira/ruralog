<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RuraLog · Dados do Lote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* basic styles from design-system */
    html { scroll-behavior: smooth; }
    body { margin: 0; }
    * { box-sizing: border-box; }
    @keyframes rl-pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .35; transform: scale(.8); } }
    @keyframes rl-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  </style>
</head>
<body style="--green:#5FBD00;--green-d:#3F8B18;--green-deep:#077000;--blue:#0085FF;--yellow:#FFCB00;--gray:#696969;--ink:#0b1410;--ink2:#11201a;--cream:#F6F7F2;--card:#ffffff;--line:#E5E8DE;--muted-d:#9DB4A6;--plum:#7A2E8C;--wine:#9A1C5A;--text:#16221b;font-family:'IBM Plex Sans',system-ui,sans-serif;color:var(--text);background:var(--cream);overflow-x:hidden;line-height:1.6;">

  <!-- TOP NAV -->
  <nav style="position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;gap:20px;padding:13px clamp(18px,5vw,56px);background:rgba(11,20,16,.88);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08);">
    <div style="font-family:'Archivo';font-weight:800;font-size:21px;letter-spacing:-.02em;"><span style="color:var(--green)">Rura</span><span style="color:var(--blue)">Log</span> <span style="color:var(--muted-d);font-weight:600;font-size:13px;">Transparência B2B</span></div>
  </nav>

  <!-- HERO -->
  <header style="position:relative;background:radial-gradient(900px 500px at 12% -5%, rgba(95,189,0,.18), transparent 60%), radial-gradient(800px 500px at 100% 10%, rgba(0,133,255,.16), transparent 55%), var(--ink);color:#F4F7F1;padding:clamp(48px,7vw,86px) clamp(18px,5vw,56px) clamp(64px,8vw,104px);overflow:hidden;">
    <div style="max-width:800px;margin:0 auto;text-align:center;">
      <div style="display:inline-flex;align-items:center;gap:9px;font-family:'IBM Plex Mono';font-size:11.5px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--green);border:1px solid rgba(95,189,0,.35);padding:6px 13px;border-radius:999px;margin-bottom:26px;">
        <span style="width:7px;height:7px;border-radius:50%;background:var(--green);animation:rl-pulse 2s infinite;"></span>Passaporte de Qualidade
      </div>
      <h1 style="font-family:'Archivo';font-weight:900;font-size:clamp(38px,5.4vw,66px);line-height:1.02;letter-spacing:-.025em;margin:0 0 22px;">Lote <span id="lote-id-display" style="color:var(--green)">ACAI-B2B-001</span></h1>
      <p style="font-size:clamp(16px,1.7vw,20px);color:#C4D4C9;max-width:560px;margin:0 auto;">Detalhes de rastreabilidade e qualidade compartilhados pela indústria.</p>
    </div>
  </header>

  <!-- INFO SECTION -->
  <section style="padding:clamp(40px,9vw,80px) clamp(18px,5vw,56px);background:var(--cream); min-height: 50vh;">
    <div style="max-width:1000px;margin:0 auto;" id="dados-lote">
       <!-- renderizado dinamicamente -->
    </div>
  </section>

  <script>
    const params = new URLSearchParams(window.location.search);
    const dadosLote = document.getElementById('dados-lote');
    
    // Mapping keys to labels and mock values
    const infoMap = {
      'origem': { label: 'Origem, local de produção da matéria prima', value: 'Araguatins, TO (Certificação Orgânica e Sustentável)' },
      'cq': { label: 'Controle de Qualidade', value: 'Aprovado (Nível A) - Laudo Físico-Químico OK' },
      'tempo': { label: 'Tempo de Produção', value: '4 horas (desde a colheita até o congelamento)' },
      'nutricional': { label: 'Informação Nutricional', value: 'Alto teor de antocianinas (320mg/100g)' },
      'esg': { label: 'Especificações ESG', value: 'Pegada de Carbono Neutra, Comércio Justo, Extração Sustentável' },
      'ph': { label: 'PH', value: '4.2' },
      'pasteurizacao': { label: 'Processo de Pasteurização', value: 'Pasteurizado a 80ºC (Choque Térmico) - Branqueamento OK' },
      'tipo': { label: 'Tipo de Açaí', value: 'Açaí Médio (11% a 14% de Sólidos Totais)' },
      'especie': { label: 'Espécie', value: 'Euterpe oleracea' },
      'variedade': { label: 'Variedade do Açaí', value: 'Açaí Preto/Roxo' },
      'lote': { label: 'Lote da Tag', value: 'LOTE-TAG-998877' }
    };

    let html = '<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));gap:18px;">';
    let hasData = false;
    
    for (const [key, item] of Object.entries(infoMap)) {
      if (params.get(key) === '1') {
        hasData = true;
        html += `
        <div style="background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 22px; transition: transform 0.2s; cursor: default;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
          <div style="font-family:'IBM Plex Mono';font-size:12px;color:var(--green-deep);margin-bottom:10px;">// ${key}</div>
          <div style="font-family:'Archivo';font-weight:700;font-size:18px;margin-bottom:8px;">${item.label}</div>
          <p style="font-size:15px;color:#52605a;margin:0;">${item.value}</p>
        </div>`;
      }
    }
    html += '</div>';

    if (!hasData) {
      html = `<p style="text-align:center;color:var(--gray);font-family:'Archivo'; font-size: 18px;">Nenhuma informação adicional foi compartilhada para este lote.</p>`;
    }

    dadosLote.innerHTML = html;
  </script>
</body>
</html>
