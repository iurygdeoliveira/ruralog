<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuraLog - Campo</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { getLote } from './js/db.js';
    import { montarHeader, botaoReset, updateIcons, fmtData } from './js/ui.js';

    async function render() {
      const app = document.getElementById('app');
      app.innerHTML = montarHeader('Campo', 'index');
      
      const main = document.createElement('main');
      main.className = 'rl-main rl-container';

      try {
        const lote = await getLote();
        
        main.innerHTML = `
          <h1 class="text-2xl font-bold mb-4">Módulo de Campo</h1>
          <div class="rl-card">
            <h2 class="font-bold mb-2">Lote: ${lote.id}</h2>
            <p class="text-gray-400">Produtor: ${lote.produtor.municipio}</p>
            <p class="text-gray-400">Status: <span class="rl-badge">${lote.status}</span></p>
            <p class="text-gray-400 mt-4">Ultima atualização: ${fmtData(lote.timeline[0]?.ts)}</p>
          </div>
        `;
      } catch (err) {
        main.innerHTML = `<div class="rl-card"><p>Erro ao carregar dados do lote.</p></div>`;
        console.error(err);
      }
      
      app.appendChild(main);
      
      botaoReset();
      updateIcons();
    }

    render();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          console.log('SW registrado com sucesso', reg.scope);
        }).catch(err => {
          console.error('Erro ao registrar SW', err);
        });
      });
    }
  </script>
</body>
</html>
