<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RuraLog - Consumidor</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { getLote } from './js/db.js';
    import { montarHeader, botaoReset, updateIcons, fmtData } from './js/ui.js';

    async function render() {
      const app = document.getElementById('app');
      app.innerHTML = montarHeader('Consumidor', 'consumidor');
      
      const main = document.createElement('main');
      main.className = 'rl-main rl-container';

      try {
        const lote = await getLote();
        
        main.innerHTML = `
          <h1 class="text-2xl font-bold mb-4">Experiência do Consumidor</h1>
          <div class="rl-card" style="text-align: center;">
            <div class="mb-4 inline-flex items-center justify-center w-16 h-16 rounded-full" style="color: var(--green); background: rgba(95,189,0,.1); border-radius: 50%; padding: 16px;">
              <i data-lucide="leaf" style="width: 32px; height: 32px;"></i>
            </div>
            <h2 class="font-bold mb-2 text-1xl">Origem 100% Rastreada</h2>
            <p class="text-gray-400 mb-6">Polpa de açaí do extremo-norte do Tocantins, extraída da comunidade de ${lote.produtor.municipio}.</p>
            
            <div class="rl-timeline text-left mt-8">
              ${lote.timeline.map(t => `
                <div class="rl-timeline-item">
                  <div class="rl-timeline-icon">
                    <i data-lucide="${t.icone || 'check'}"></i>
                  </div>
                  <div class="rl-timeline-content">
                    <div class="rl-timeline-date">${fmtData(t.ts)}</div>
                    <strong>${t.etapa}</strong>
                    <p class="text-gray-400 text-sm mt-1">${t.descricao}</p>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      } catch (err) {
        main.innerHTML = `<div class="rl-card"><p>Erro ao carregar dados do lote.</p></div>`;
        console.error(err);
      }
      
      app.appendChild(main);
      
      botaoReset();
      updateIcons();
    }

    render();
  </script>
</body>
</html>
